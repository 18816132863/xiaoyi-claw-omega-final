name: Nightly Audit

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 2>/dev/null || true

    - name: Check Repo Integrity
      run: |
        python scripts/check_repo_integrity.py --strict

    - name: Run Nightly Audit
      run: |
        python scripts/run_nightly_audit.py

    - name: Generate Alerts
      run: |
        python scripts/generate_alerts.py --workflow nightly --profile nightly

    - name: Build Dashboard
      run: |
        python scripts/build_ops_dashboard.py

    - name: Generate Ops State
      run: |
        python scripts/ops_center.py status

    - name: Generate Ops Bundle
      run: |
        python scripts/ops_center.py bundle

    - name: Remediation Plan
      run: |
        python scripts/remediation_center.py plan

    - name: Auto Execute Remediation
      if: ${{ env.ENABLE_SAFE_REMEDIATION == 'true' }}
      env:
        ENABLE_SAFE_REMEDIATION: ${{ vars.ENABLE_SAFE_REMEDIATION || 'false' }}
      run: |
        python scripts/remediation_center.py auto-execute --profile nightly_auto --workflow nightly

    - name: Create Summary
      run: |
        echo "## 🌙 Nightly Audit Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python scripts/render_nightly_summary.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nightly-reports
        path: |
          reports/
          governance/ops/incident_tracker.json
        retention-days: 30
