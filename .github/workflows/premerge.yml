name: Premerge Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 2>/dev/null || true

    - name: Check Repo Integrity
      run: |
        python scripts/check_repo_integrity.py --strict

    - name: Run Premerge Gate
      run: |
        python scripts/run_release_gate.py premerge

    - name: Create Summary
      run: |
        echo "## 🔍 Premerge Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python scripts/render_premerge_summary.py >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: premerge-reports
        path: |
          reports/runtime_integrity.json
          reports/quality_gate.json
        retention-days: 7
