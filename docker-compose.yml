version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw_dev
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  message-server:
    build:
      context: .
      dockerfile: Dockerfile.message-server
    ports:
      - "18790:18790"
    environment:
      - OPENCLAW_ENV=prod
    depends_on:
      - postgres
      - redis

  task-daemon:
    build:
      context: .
      dockerfile: Dockerfile.task-daemon
    environment:
      - OPENCLAW_ENV=prod
      - DATABASE_URL=postgresql://openclaw:openclaw_dev@postgres:5432/openclaw
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
